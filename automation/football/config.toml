[llm]
api_key = "sk-your-api-key-here"
model = "deepseek-chat"
base_url = "https://api.deepseek.com"

[project]
output_dir = "output"
font_path = "fonts/msyh.ttc"
max_duration = 20
min_duration = 15
resolution_width = 1080
resolution_height = 1920

[news]
sources = ["sina", "baidu", "dongqiudi", "hupu", "sogou"]
max_results = 10

[tts]
voice = "zh-CN-YunxiNeural"
rate = "random"
volume = "+0%"
enable_ssml = true
pitch_variation = true
bgm_enabled = true
bgm_paths = ["materials/audio/bgm_chinese_new_year.mp3", "materials/audio/bgm_whistle_folk.mp3"]
bgm_volume = -20
bgm_random = true

[publish]
headless = false
cookies_dir = "cookies"
platforms = ["douyin", "xiaohongshu", "kuaishou", "weixin"]

[themes]
# 主题配置：支持多主题切换
football = { enabled = true, name = "足球", fetch_script = "scripts.fetch_news", generate_script = "scripts.generate_script" }
campus = { enabled = true, name = "校园生活", fetch_script = "scripts.fetch_campus_news", generate_script = "scripts.generate_campus_script" }
workplace = { enabled = true, name = "职场生存", fetch_script = "scripts.fetch_workplace_news", generate_script = "scripts.generate_workplace_script" }
emotional = { enabled = true, name = "情感纠葛", fetch_script = "scripts.fetch_emotional_news", generate_script = "scripts.generate_emotional_script" }
horoscope = { enabled = true, name = "星座运势", fetch_script = "scripts.fetch_horoscope_news", generate_script = "scripts.generate_horoscope_script" }

[flow_state]
# 心流状态配置
enabled = true
default_state = "balanced"
states = [
    { name = "creative", bgm_boost = true, duration_modifier = 1.2, creative_content = true },
    { name = "productive", process_optimization = true, parallel_tasks = true },
    { name = "balanced", standard_mode = true },
    { name = "energetic", fast_pace = true, dynamic_content = true },
    { name = "reflective", quality_focus = true, detailed_analysis = true }
]

[workflow]
# 工作流配置
parallel_processing = true
batch_mode_enabled = true
auto_resume_on_error = true
max_retries = 3
timeout_seconds = 600

[content]
# 内容配置
meme_enabled = true
meme_directory = "materials/images/memes"
atmospheric_text_enabled = true
storytelling_elements = true
consistency_mode = "balanced"
